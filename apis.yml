aid: cycloid
name: Cycloid
x-type: company
description: >-
  Cycloid is a unified Internal Developer Portal & Platform combining
  self-service Service Catalogs (Stacks and StackForms), Infrastructure
  as Code orchestration, multi-cloud asset inventory (Asset Inventory
  and InfraView), CI/CD pipeline centralization, FinOps and GreenOps
  cost / carbon dashboards, RBAC governance, and an MCP server for
  natural-language interaction. Cycloid exposes a public HTTP REST API
  at http-api.cycloid.io for programmatic management of organizations,
  projects, environments, stacks, pipelines, credentials, config
  repositories, and cloud cost dashboards. Authentication is via API
  key or OAuth2 with token refresh; the canonical Swagger / Redoc
  reference is published at docs.cycloid.io.
